<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Coding Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: #1e1e2e;
    color: #cdd6f4;
    min-height: 100vh;
    padding: 30px 16px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 1.4rem; color: #f9e2af; margin-bottom: 4px; letter-spacing: 1px; }
  .subtitle { font-size: 0.8rem; color: #6c7086; margin-bottom: 28px; }
  .progress-bar { background: #313244; border-radius: 4px; height: 6px; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: #f9e2af; border-radius: 4px; transition: width 0.4s ease; }
  .question-card { background: #181825; border: 1px solid #313244; border-radius: 8px; padding: 22px; margin-bottom: 16px; display: none; }
  .question-card.active { display: block; }
  .q-num { font-size: 0.7rem; color: #6c7086; margin-bottom: 6px; }
  .q-text { font-size: 1rem; color: #cdd6f4; margin-bottom: 6px; line-height: 1.5; white-space: pre-wrap; }
  .q-hint { font-size: 0.78rem; color: #45475a; margin-bottom: 16px; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { background: #313244; border: 1px solid #45475a; border-radius: 6px; padding: 10px 14px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 0.9rem; color: #cdd6f4; text-align: left; transition: border-color 0.2s, background 0.2s; }
  .option:hover:not(:disabled) { border-color: #f9e2af; background: #1e1e2e; }
  .option.correct { border-color: #a6e3a1; background: #1c2a1c; color: #a6e3a1; }
  .option.wrong { border-color: #f38ba8; background: #2a1c1e; color: #f38ba8; }
  .option:disabled { cursor: default; }
  .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #1c2a1c; color: #a6e3a1; border: 1px solid #a6e3a1; }
  .feedback.wrong { background: #2a1c1e; color: #f38ba8; border: 1px solid #f38ba8; }
  .btn { margin-top: 14px; background: #f9e2af; color: #1e1e2e; border: none; border-radius: 6px; padding: 9px 20px; font-family: 'Courier New', monospace; font-size: 0.9rem; cursor: pointer; font-weight: bold; display: none; }
  .btn:hover { background: #fde8c0; }
  .score-card { background: #181825; border: 1px solid #f9e2af; border-radius: 8px; padding: 30px; text-align: center; display: none; }
  .score-card h2 { color: #f9e2af; font-size: 1.3rem; margin-bottom: 10px; }
  .score-big { font-size: 2.5rem; color: #a6e3a1; margin: 10px 0; }
  .score-sub { color: #6c7086; font-size: 0.85rem; margin-bottom: 20px; }
  .retry-btn { background: transparent; border: 1px solid #f9e2af; color: #f9e2af; border-radius: 6px; padding: 8px 20px; font-family: 'Courier New', monospace; cursor: pointer; font-size: 0.9rem; }
  .retry-btn:hover { background: #f9e2af; color: #1e1e2e; }
</style>
</head>
<body>
<div class="container">
  <h1>// JS Coding Lab</h1>
  <p class="subtitle">Beginner JavaScript · 6 Questions</p>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div id="quiz"></div>
  <div class="score-card" id="scoreCard">
    <h2>Lab Complete!</h2>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-sub" id="scoreSub"></div>
    <button class="retry-btn" onclick="startQuiz()">↩ Try Again</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "What does this output?\n\nconsole.log(typeof \"hello\")",
    hint: "Hint: typeof returns the data type as a string",
    options: ["string", "text", "String", "char"],
    answer: 0,
    explanation: "typeof \"hello\" returns the string \"string\" (lowercase)."
  },
  {
    q: "What is the output?\n\nlet x = 5;\nx += 3;\nconsole.log(x);",
    hint: "Hint: += adds to the current value",
    options: ["5", "3", "8", "53"],
    answer: 2,
    explanation: "x starts at 5, then += 3 adds 3, so x becomes 8."
  },
  {
    q: "Which method adds an item to the END of an array?\n\nlet arr = [1, 2, 3];",
    hint: "Hint: think 'push' vs 'pop'",
    options: ["arr.pop()", "arr.push(4)", "arr.shift()", "arr.add(4)"],
    answer: 1,
    explanation: "push() adds one or more items to the end of an array."
  },
  {
    q: "What does this return?\n\n[1, 2, 3].length",
    hint: "Hint: .length counts how many items are in the array",
    options: ["2", "4", "3", "undefined"],
    answer: 2,
    explanation: "The array has 3 elements, so .length returns 3."
  },
  {
    q: "What is the output?\n\nconsole.log(10 === \"10\")",
    hint: "Hint: === checks value AND type",
    options: ["true", "false", "undefined", "error"],
    answer: 1,
    explanation: "=== (strict equality) checks type too. A number and string are not the same type, so it's false."
  },
  {
    q: "How do you declare a constant in JavaScript?",
    hint: "Hint: it cannot be reassigned after declaration",
    options: ["var x = 5", "let x = 5", "const x = 5", "fixed x = 5"],
    answer: 2,
    explanation: "const declares a variable that cannot be reassigned. It's block-scoped like let."
  }
];

let current = 0, score = 0, answered = false;

function startQuiz() {
  current = 0; score = 0; answered = false;
  document.getElementById('scoreCard').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const quiz = document.getElementById('quiz');
  quiz.innerHTML = '';
  document.getElementById('progress').style.width = (current / questions.length * 100) + '%';
  if (current >= questions.length) { showScore(); return; }

  const q = questions[current];
  const card = document.createElement('div');
  card.className = 'question-card active';
  card.innerHTML = `
    <div class="q-num">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="q-hint">${q.hint}</div>
    <div class="options" id="options">
      ${q.options.map((o, i) => `<button class="option" onclick="pick(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="nextBtn" onclick="next()">${current === questions.length - 1 ? 'Finish' : 'Next →'}</button>
  `;
  quiz.appendChild(card);
  answered = false;
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option');
  const fb = document.getElementById('feedback');
  btns.forEach(b => b.disabled = true);
  btns[q.answer].classList.add('correct');
  if (idx === q.answer) {
    score++;
    fb.textContent = '✓ ' + q.explanation;
    fb.className = 'feedback show correct';
  } else {
    btns[idx].classList.add('wrong');
    fb.textContent = '✗ Not quite. ' + q.explanation;
    fb.className = 'feedback show wrong';
  }
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; renderQuestion(); }

function showScore() {
  document.getElementById('quiz').innerHTML = '';
  document.getElementById('progress').style.width = '100%';
  const msgs = ['Keep at it!', 'Good effort!', 'Nice work!', 'Great job!', 'Excellent!', 'Perfect! 🎉'];
  document.getElementById('scoreCard').style.display = 'block';
  document.getElementById('scoreBig').textContent = `${score} / ${questions.length}`;
  document.getElementById('scoreSub').textContent = msgs[score];
}

startQuiz();
</script>
</body>
</html>
